services:
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb:inception
    container_name: mariadb
    networks:
      - inception-network
    volumes:
      - wp_database:/var/lib/mysql
    environment:
      DATABASE_ROOT_PASSWORD_FILE: ${DATABASE_ROOT_PASSWORD_FILE}
      DATABASE_PASSWORD_FILE: ${DATABASE_PASSWORD_FILE}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
    secrets:
      - db_root_password
      - db_password
    restart: unless-stopped
  
  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress:inception
    container_name: wordpress
    networks:
      - inception-network
    volumes:
      - wp_files:/var/www/html
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD_FILE: ${DATABASE_PASSWORD_FILE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_ADMIN_PASSWORD_FILE: ${WP_ADMIN_PASSWORD_FILE}
      WP_USER: ${WP_USER}
      WP_USER_EMAIL: ${WP_USER_EMAIL}
      WP_USER_PASSWORD_FILE: ${WP_USER_PASSWORD_FILE}
      WP_TITLE: ${WP_TITLE}
      DOMAIN_NAME: ${DOMAIN_NAME}
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    depends_on:
      - mariadb
    restart: unless-stopped

  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx:inception
    container_name: nginx
    ports:
      - "443:443"
    networks:
      - inception-network
    volumes:
      - wp_files:/var/www/html
    depends_on:
       - wordpress
    restart: unless-stopped
  
volumes:
  wp_database:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/mariadb
  wp_files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/wordpress

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt

networks:
  inception-network:
    driver: bridge