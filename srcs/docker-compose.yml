services:
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb:inception
    container_name: mariadb
    networks:
      - inception-network
    volumes:
      - wp_database:/var/lib/mysql
    environment:
      DATABASE_ROOT_PASSWORD_FILE: ${DATABASE_ROOT_PASSWORD_FILE}
      DATABASE_PASSWORD_FILE: ${DATABASE_PASSWORD_FILE}
    secrets:
      - db_root_password
      - db_password
    env_file:
      - .env
    restart: unless-stopped
  
  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress:inception
    container_name: wordpress
    networks:
      - inception-network
    volumes:
      - wp_files:/var/www/html
    environment:
      DATABASE_PASSWORD_FILE: ${DATABASE_PASSWORD_FILE}
    secrets:
      - db_password
    env_file:
      - .env
    depends_on:
       - mariadb
    restart: unless-stopped

  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx:inception
    container_name: nginx
    ports:
      - "443:443"
    networks:
      - inception-network
    volumes:
      - wp_files:/var/www/html
    env_file:
      - .env
    depends_on:
       - wordpress
    restart: unless-stopped
  
volumes:
  wp_database:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/carlaugu/data/mariadb
  wp_files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/carlaugu/data/wordpress

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt

networks:
  inception-network:
    driver: bridge